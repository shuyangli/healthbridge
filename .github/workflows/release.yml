# Cuts a release of the healthbridge CLI on tag push.
#
# Triggered by tags matching `v*`. Builds darwin/linux x amd64/arm64
# tarballs via GoReleaser, publishes a GitHub Release, and opens a
# formula-bump PR against shuyangli/homebrew-tap.
#
# Required secrets:
#   - GITHUB_TOKEN (provided automatically)
#   - HOMEBREW_TAP_GITHUB_TOKEN: fine-grained PAT scoped to
#     shuyangli/homebrew-tap with Contents r/w + Pull requests r/w.
#
# See cli/docs/distribution.md for the full design.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          check-latest: false
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
