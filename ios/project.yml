name: HealthBridge

# Regenerate the .xcodeproj from this file with `xcodegen` (run from ios/).
# The .xcodeproj is gitignored — this YAML is the source of truth, so PRs
# that touch the iOS app structure stay reviewable as text.
#
# Important: we ship a hand-written Info.plist and entitlements file with
# the HealthKit usage strings (which App Review will read). This YAML must
# NOT contain `info:` or `entitlements:` blocks at the target level — those
# would tell xcodegen to *generate* those files and clobber the hand-
# written ones. Instead the paths are wired through INFOPLIST_FILE and
# CODE_SIGN_ENTITLEMENTS in the target's build settings.

options:
  bundleIdPrefix: li.shuyang.healthbridge
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    # Personal Apple developer team. The ID isn't a secret — it's
    # visible in any signed app bundle's entitlements — but if you fork
    # this repo you'll want to swap in your own.
    DEVELOPMENT_TEAM: RM2BB7S3BX
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

# HealthBridgeKit is the local Swift Package next to project.yml. We point
# at it as a local package dependency so the app target can `import
# HealthBridgeKit` without duplicating sources.
packages:
  HealthBridgeKit:
    path: .

targets:
  HealthBridge:
    type: application
    platform: iOS
    sources:
      - path: HealthBridgeApp
        excludes:
          - "README.md"
          - "Info.plist"
          - "HealthBridge.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: li.shuyang.healthbridge
        INFOPLIST_FILE: HealthBridgeApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthBridgeApp/HealthBridge.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        # We supply our own Info.plist with the HealthKit usage strings
        # (NSHealthShare/NSHealthUpdateUsageDescription). Auto-generation
        # would erase those.
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: HealthBridgeKit
        product: HealthBridgeKit
    scheme:
      testTargets: []
      gatherCoverageData: false
