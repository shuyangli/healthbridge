name = "healthbridge"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Per-pair mailboxes are isolated using a Durable Object keyed by pair_id.
# Free tier supports DO with the workers.dev subdomain.
[[durable_objects.bindings]]
name = "PAIR_DO"
class_name = "PairMailboxDO"

# Free-plan Durable Objects require SQLite-backed classes — `new_classes`
# is rejected with error 10097 on the free tier. SQLite-backed DOs are
# functionally identical for our use (per-pair mailbox state).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PairMailboxDO"]
